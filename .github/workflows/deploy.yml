name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:      # manual trigger (also used for destroy)

env:
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.11"

jobs:

  # ── 1. Lint & Validate ──────────────────────────────────────────────────────
  lint-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        env:
          # Dummy values so validate doesn't complain about missing vars
          TF_VAR_email:                 "ci@example.com"
          TF_VAR_github_repo:           "https://github.com/placeholder/aws-assessment"
          TF_VAR_cognito_temp_password: "Placeholder1!"

      - name: Terraform Validate
        run: terraform validate

  # ── 2. Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: lint-validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --soft-fail \
            --skip-check CKV_AWS_50,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_7 \
            --output cli \
            --output junitxml \
            --output-file-path checkov-report.xml
        # Skipped:
        #   CKV_AWS_50  — Lambda X-Ray (not needed for assessment)
        #   CKV_AWS_115 — Lambda concurrency limit
        #   CKV_AWS_116 — Lambda DLQ
        #   CKV_AWS_117 — Lambda VPC (intentionally outside VPC)
        #   CKV_AWS_7   — Cognito MFA (not in scope)

      - name: Upload Checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-report.xml

  # ── 3. Plan ─────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    # Only runs when AWS credentials are configured as repository secrets
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="email=${{ secrets.CANDIDATE_EMAIL }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="cognito_temp_password=${{ secrets.COGNITO_TEMP_PASSWORD }}" \
            -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  # ── 4. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    outputs:
      primary_api_url:   ${{ steps.outputs.outputs.primary_api_url }}
      secondary_api_url: ${{ steps.outputs.outputs.secondary_api_url }}
      user_pool_id:      ${{ steps.outputs.outputs.user_pool_id }}
      client_id:         ${{ steps.outputs.outputs.client_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: outputs
        run: |
          echo "primary_api_url=$(terraform output -raw primary_api_url)"     >> $GITHUB_OUTPUT
          echo "secondary_api_url=$(terraform output -raw secondary_api_url)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)"   >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw cognito_client_id)"         >> $GITHUB_OUTPUT

  # ── 5. Integration Tests ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install boto3 requests

      - name: Run test script
        run: |
          python test/test_script.py \
            --user-pool-id  "${{ needs.deploy.outputs.user_pool_id }}" \
            --client-id     "${{ needs.deploy.outputs.client_id }}" \
            --username      "${{ secrets.CANDIDATE_EMAIL }}" \
            --password      "${{ secrets.COGNITO_PASSWORD }}" \
            --primary-url   "${{ needs.deploy.outputs.primary_api_url }}" \
            --secondary-url "${{ needs.deploy.outputs.secondary_api_url }}"
        env:
          AWS_DEFAULT_REGION: us-east-1

  # ── 6. Teardown (manual only) ─────────────────────────────────────────────
  teardown:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="email=${{ secrets.CANDIDATE_EMAIL }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="cognito_temp_password=${{ secrets.COGNITO_TEMP_PASSWORD }}"
